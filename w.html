<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>她的六年</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#151515;--text:#e8e0d4;--dim:#7a746b;--accent:#c4956a;--accent2:#8b6f5e;--red:#9e4b4b;--blue:#4b6b8a;--green:#5a7a5a;--purple:#6b5278;--gold:#8a7a3a;--bar-h:#6b8a6b;--bar-w:#8a8a4b;--bar-c:#6b7a8a;--bar-a:#7a6b8a;--bar-m:#8a6b6b}
html,body{width:100%;min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif;font-size:15px;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:420px;margin:0 auto;padding:16px;min-height:100vh;min-height:100dvh;position:relative}
.fade-in{animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.screen{padding-bottom:40px}
.title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;min-height:90dvh;text-align:center}
.title-screen h1{font-size:28px;font-weight:300;letter-spacing:8px;margin-bottom:8px;color:var(--accent)}
.title-screen .sub{font-size:13px;color:var(--dim);margin-bottom:48px;letter-spacing:2px}
.title-screen .desc{font-size:12px;color:var(--dim);max-width:280px;line-height:1.9;margin-bottom:48px}
.btn{display:block;width:100%;padding:14px 0;border:1px solid var(--accent2);background:transparent;color:var(--text);font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .3s;border-radius:2px;margin-bottom:10px;font-family:inherit}
.btn:hover,.btn:active{background:var(--accent2);color:#0a0a0a}
.btn-main{border-color:var(--accent);color:var(--accent)}
.btn-main:hover,.btn-main:active{background:var(--accent);color:#0a0a0a}
.btn-small{padding:10px 0;font-size:13px}
.section-title{font-size:11px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:16px}
.card{background:var(--card);border-radius:4px;padding:20px;margin-bottom:16px;border-left:2px solid var(--accent2)}
.card p{margin-bottom:12px;font-size:14px}
.card p:last-child{margin-bottom:0}
.card .label{font-size:11px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:4px}
.narrative{font-size:14px;line-height:2;color:var(--text);margin-bottom:24px;padding:0 4px}
.narrative .highlight{color:var(--accent)}
.age-tag{display:inline-block;font-size:11px;color:var(--accent);border:1px solid var(--accent2);padding:2px 10px;border-radius:2px;margin-bottom:16px;letter-spacing:2px}
.year-header{text-align:center;padding:40px 0 32px;border-bottom:1px solid #222;margin-bottom:24px}
.year-header .age{font-size:42px;font-weight:200;color:var(--accent);letter-spacing:4px}
.year-header .year-desc{font-size:12px;color:var(--dim);margin-top:8px}
.stats-bar{margin-bottom:24px}
.stat-row{display:flex;align-items:center;margin-bottom:8px}
.stat-label{width:36px;font-size:11px;color:var(--dim);letter-spacing:1px;flex-shrink:0}
.stat-track{flex:1;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin:0 8px}
.stat-fill{height:100%;border-radius:3px;transition:width .8s ease}
.stat-val{width:28px;font-size:11px;color:var(--dim);text-align:right;flex-shrink:0}
.stat-change{font-size:10px;margin-left:4px;font-weight:bold}
.stat-change.pos{color:var(--green)}
.stat-change.neg{color:var(--red)}
.choice-btn{display:block;width:100%;padding:16px;border:1px solid #2a2a2a;background:transparent;color:var(--text);font-size:13px;line-height:1.8;cursor:pointer;transition:all .3s;border-radius:2px;margin-bottom:10px;text-align:left;font-family:inherit}
.choice-btn:hover,.choice-btn:active{border-color:var(--accent);background:rgba(196,149,106,.05)}
.choice-btn .choice-label{color:var(--accent);font-size:11px;display:block;margin-bottom:4px;letter-spacing:2px}
.result-card{background:var(--card);padding:20px;border-radius:4px;margin-bottom:20px;border-left:2px solid var(--accent)}
.result-card .result-text{font-size:14px;line-height:2;margin-bottom:16px}
.dialogue-screen{min-height:90vh;min-height:90dvh;display:flex;flex-direction:column;justify-content:center;padding:20px}
.dialogue-screen .speaker{font-size:12px;color:var(--accent);letter-spacing:3px;margin-bottom:16px}
.dialogue-screen .quote{font-size:15px;line-height:2.2;color:var(--text);margin-bottom:32px;font-style:italic}
.dialogue-screen .context{font-size:11px;color:var(--dim);margin-bottom:32px}
.ending-screen{min-height:90vh;min-height:90dvh;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:20px}
.ending-screen .ending-text{font-size:15px;line-height:2.4;margin-bottom:40px;text-align:left}
.ending-screen .ending-title{font-size:18px;color:var(--accent);letter-spacing:4px;margin-bottom:24px;font-weight:300}
.score-screen{min-height:90vh;min-height:90dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.score-screen .fake-score{font-size:20px;color:var(--dim);margin-bottom:32px;letter-spacing:2px}
.score-screen .reveal{font-size:16px;line-height:2.4;color:var(--text);max-width:300px}
.score-screen .emoji{font-size:24px;margin:0 4px}
.creation-q{font-size:16px;color:var(--text);margin-bottom:24px;line-height:1.8}
.divider{width:40px;height:1px;background:var(--accent2);margin:24px auto}
.typewriter{overflow:hidden;white-space:pre-wrap}
.progress-dots{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.progress-dots .dot{width:6px;height:6px;border-radius:50%;background:#2a2a2a}
.progress-dots .dot.active{background:var(--accent)}
.progress-dots .dot.done{background:var(--accent2)}
.flag-note{font-size:11px;color:var(--accent2);margin-top:8px;font-style:italic;padding-left:12px;border-left:1px solid var(--accent2)}
.butterfly{font-size:11px;color:var(--purple);margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ==================== GAME STATE ====================
const G = {
  stats: {h:60,w:50,c:50,a:50,m:50},
  flags: {},
  year: 0,
  history: [],
  dialoguesSeen: {},
  creationStep: 0,
  location: '',
  family: '',
  worry: ''
};

// ==================== UTILITY ====================
const $ = id => document.getElementById(id);
const app = () => document.getElementById('app');

function clamp(v,min=0,max=100){return Math.max(min,Math.min(max,v))}

function applyStats(effects){
  const changes = {};
  for(let k in effects){
    const old = G.stats[k];
    G.stats[k] = clamp(G.stats[k]+effects[k]);
    changes[k] = G.stats[k] - old;
  }
  return changes;
}

function hasFlag(f){return !!G.flags[f]}
function setFlag(f){G.flags[f]=true}

function render(html){
  const a = app();
  a.innerHTML = `<div class="screen fade-in">${html}</div>`;
  a.scrollTo({top:0,behavior:'auto'});
}

function statsHTML(changes){
  const names = {h:'健康',w:'财富',c:'人脉',a:'学业',m:'心智'};
  const colors = {h:'var(--bar-h)',w:'var(--bar-w)',c:'var(--bar-c)',a:'var(--bar-a)',m:'var(--bar-m)'};
  let s = '<div class="stats-bar">';
  for(let k in names){
    const v = G.stats[k];
    const ch = changes && changes[k] ? changes[k] : 0;
    const chHTML = ch !== 0 ? `<span class="stat-change ${ch>0?'pos':'neg'}">${ch>0?'+':''}${ch}</span>` : '';
    s += `<div class="stat-row">
      <span class="stat-label">${names[k]}</span>
      <div class="stat-track"><div class="stat-fill" style="width:${v}%;background:${colors[k]}"></div></div>
      <span class="stat-val">${v}${chHTML}</span>
    </div>`;
  }
  s += '</div>';
  return s;
}

function progressHTML(current,total=6){
  let s='<div class="progress-dots">';
  for(let i=0;i<total;i++){
    const cls = i<current?'done':i===current?'active':'';
    s+=`<div class="dot ${cls}"></div>`;
  }
  s+='</div>';
  return s;
}

// ==================== SCREENS ====================
function showTitle(){
  render(`
    <div class="title-screen">
      <h1>她的六年</h1>
      <div class="sub">一个女性成长模拟器</div>
      <div class="desc">
        18岁到24岁。<br>
        六年，六个选择。<br>
        每一个选择都会改变你的人生轨迹。<br><br>
        这不是一个有标准答案的游戏。<br>
        这是你的故事。
      </div>
      <button class="btn btn-main" onclick="showCreation1()">开始</button>
    </div>
  `);
}

function showCreation1(){
  render(`
    <div class="section-title">创建角色 · 1/3</div>
    <div class="creation-q">你在哪里长大？</div>
    <button class="choice-btn" onclick="pickLocation('city1')">
      <span class="choice-label">一线城市</span>
      资源多，竞争大，见过世面，也见过代价
    </button>
    <button class="choice-btn" onclick="pickLocation('city2')">
      <span class="choice-label">二三线城市</span>
      不远不近，什么都有一点，什么都差一点
    </button>
    <button class="choice-btn" onclick="pickLocation('town')">
      <span class="choice-label">县城 / 乡镇</span>
      人人都认识，每个选择都有人盯着看
    </button>
  `);
}

function pickLocation(loc){
  G.location = loc;
  if(loc==='city1'){G.stats={h:55,w:65,c:60,a:65,m:50}}
  else if(loc==='city2'){G.stats={h:60,w:50,c:50,a:55,m:55}}
  else{G.stats={h:65,w:35,c:40,a:45,m:60}}
  showCreation2();
}

function showCreation2(){
  render(`
    <div class="section-title">创建角色 · 2/3</div>
    ${statsHTML()}
    <div class="creation-q">你的家庭是什么样的？</div>
    <button class="choice-btn" onclick="pickFamily('open')">
      <span class="choice-label">开明支持</span>
      他们不一定懂你，但愿意让你试
    </button>
    <button class="choice-btn" onclick="pickFamily('normal')">
      <span class="choice-label">普通期待</span>
      希望你安稳，最好别出格
    </button>
    <button class="choice-btn" onclick="pickFamily('control')">
      <span class="choice-label">强控制 / 重男轻女</span>
      你的人生有一张他们画好的地图
    </button>
    <button class="choice-btn" onclick="pickFamily('single')">
      <span class="choice-label">单亲 / 家庭缺位</span>
      很早就学会了一个人扛
    </button>
  `);
}

function pickFamily(f){
  G.family = f;
  const fx = {
    open:{h:5,w:10,c:10,a:10,m:15},
    normal:{h:0,w:0,c:0,a:5,m:-5},
    control:{h:-5,w:-10,c:-5,a:-5,m:-15},
    single:{h:-5,w:-15,c:-10,a:0,m:10}
  };
  applyStats(fx[f]);
  showCreation3();
}

function showCreation3(){
  render(`
    <div class="section-title">创建角色 · 3/3</div>
    ${statsHTML()}
    <div class="creation-q">现在最困扰你的是什么？</div>
    <button class="choice-btn" onclick="pickWorry('lost')">
      <span class="choice-label">我不知道自己想要什么</span>
      好像每条路都可以，又好像每条路都不是
    </button>
    <button class="choice-btn" onclick="pickWorry('expect')">
      <span class="choice-label">我总是活在别人的期待里</span>
      做的每件事都是为了让谁满意
    </button>
    <button class="choice-btn" onclick="pickWorry('alone')">
      <span class="choice-label">我很孤独，但不知道怎么开口</span>
      身边有人，心里没人
    </button>
    <button class="choice-btn" onclick="pickWorry('notgood')">
      <span class="choice-label">我害怕自己不够好</span>
      努力了也不确定有没有用
    </button>
    <button class="choice-btn" onclick="pickWorry('body')">
      <span class="choice-label">我的身体在透支</span>
      停不下来，也不敢停
    </button>
  `);
}

function pickWorry(w){
  G.worry = w;
  const fx = {
    lost:{m:-10},expect:{m:-15},alone:{c:-10},notgood:{a:-10},body:{h:-15}
  };
  const wflags = {lost:'worry_lost',expect:'worry_expect',alone:'worry_alone',notgood:'worry_notgood',body:'worry_body'};
  applyStats(fx[w]);
  setFlag(wflags[w]);
  startGame();
}

// ==================== EVENT DATA (30 Events) ====================
const EVENTS = [
  // ===== POOL 1: 18岁 高三 (events 0-4) =====
  {id:'e01',pool:1,age:18,title:'文理分科',
    cond:()=>true,priority:10,
    text:'高三分班前。班主任把你叫到办公室，翘着二郎腿，用一种"为你好"的语气说：\n\n「女生学理科太吃力了。你的成绩去文科稳稳的，以后考个师范，多好。」\n\n他的语气不容置疑。办公桌上摆着他女儿的照片——也是个女孩，正在念师范。',
    choices:[
      {text:'听从建议，转文科',
        effects:{a:5,m:-10},flags:['went_arts'],
        result:'你在分班表上签了字。手指握着笔的时候，有一种说不出的空。\n\n文科班的同学们在讨论历史和政治，你坐在靠窗的位置，想：这也不差。但你知道你的物理卷子上，最后一道大题，你是会做的。'},
      {text:'坚持留在理科班',
        effects:{a:-5,m:15},flags:['stayed_science'],
        result:'你说："老师，我想留在理科。"\n\n他的表情像是吃了个酸果。"随你。"\n\n回到教室，压力像潮水一样。但那天晚上做物理题的时候，笔尖落在纸上，你觉得踏实。'},
      {text:'表面答应，私下按自己的方向准备',
        effects:{w:-5,m:10,c:-5},flags:['double_life'],
        result:'你微笑着说好。\n\n然后用攒了三个月的零花钱报了网课，在自习课上偷偷刷题。班主任以为你在乖乖念文科，你妈以为你在听话。\n\n只有你自己知道，你在两条路上同时走着。很累。但这是你自己选的累。'}
    ]
  },
  {id:'e02',pool:1,age:18,title:'高考前夜',
    cond:()=>true,priority:5,
    text:'高考前一晚。你坐在书桌前，面前摊着笔记，但一个字也看不进去。\n\n妈妈推门进来，放下一杯牛奶。她欲言又止，最后说了一句：「考不好也没事……女孩子嘛，以后找个好对象也一样。」\n\n她走了之后，牛奶在桌上冒着热气。你盯着那杯牛奶，不知道该感动还是该生气。',
    choices:[
      {text:'什么也没说，把牛奶喝了，继续看书',
        effects:{h:5,m:-5},flags:['swallowed'],
        result:'牛奶是甜的。眼眶也是热的。\n\n你翻开下一页笔记，在心里跟自己说：我不是为了找对象才坐在这里的。但你没说出口。有些话，说出来要花比考试更大的力气。'},
      {text:'去找妈妈谈：我不需要"退路"',
        effects:{m:15,c:-5},flags:['spoke_to_mom'],
        result:'「妈，我不想把'找对象'当退路。」\n\n她愣了。然后笑了一下，那种不知道怎么接话的笑。「我就是说说……」\n\n你知道她爱你。但爱和理解之间，隔着一整代人的距离。'},
      {text:'在日记里写下：我要为自己考',
        effects:{m:10},flags:['diary'],
        result:'你拿出那本发黄的日记本，写了一行字：\n\n"明天的考试是为我自己。不管结果怎样，这件事是我自己的。"\n\n写完之后，牛奶凉了。但你觉得手不抖了。'}
    ]
  },
  {id:'e03',pool:1,age:18,title:'外貌焦虑',
    cond:()=>hasFlag('worry_body')||hasFlag('worry_notgood'),priority:8,
    text:'班里开始流行一个"颜值评分"的游戏。男生们在群里给女生打分，1到10分。\n\n你的好朋友哭着找你，说她被打了3分。你安慰了她一整个中午，但回家之后打开手机，忍不住去看了自己的分数。\n\n6分。\n\n你知道这个评分毫无意义。但那个"6"像一根刺，扎在心里拔不出来。',
    choices:[
      {text:'在群里发了一段话：谁给了你们打分的权力？',
        effects:{m:15,c:-10},flags:['spoke_against_rating'],
        result:'消息发出去，群里先是安静了三秒。然后有人回了个「哟」。有人说「开不起玩笑」。但你的好朋友私信你：谢谢。\n\n那天晚上你删了群。那个"6"还在，但你决定不让它定义你了。'},
      {text:'默默退群，但开始研究穿搭和护肤',
        effects:{h:-5,w:-5,m:-5},flags:['appearance_anxiety'],
        result:'你退了群。然后打开了购物app。\n\n防晒、精华、眼霜。你不确定自己是在"变好"还是在"补救"。镜子里的你没有变，但你开始用一种审视的眼光看自己。\n\n你告诉自己这叫"精致"。但在某些深夜，你知道这叫不安。'},
      {text:'跟好朋友一起约定：我们不看那个群了',
        effects:{c:10,m:5},flags:['pact_with_friend'],
        result:'你打电话给她。"我们把这个群删了好不好？"\n\n她在电话那头沉默了一会儿，然后说："好。"\n\n那天你们聊了很久，聊小时候，聊以后想去的地方。没人打分，没有排名。你想起来，有一个人愿意听你说话，比10分值钱多了。'}
    ]
  },
  {id:'e04',pool:1,age:18,title:'母亲的期待',
    cond:()=>G.family==='control'||G.family==='normal',priority:7,
    text:'寒假。亲戚聚餐。\n\n你妈当着所有人的面说：「我们家闺女可乖了，学习好，又懂事，以后肯定找个好人家。」\n\n饭桌上所有人都在笑，你姑姑接话：「女孩子最重要的是嫁得好。」\n\n你夹菜的筷子停在了半空。',
    choices:[
      {text:'放下筷子说：「我最重要的是活得好。」',
        effects:{m:20,c:-15},flags:['defied_family'],
        result:'饭桌突然安静了。你妈的脸色变了。\n\n回家的路上，她一路没说话。到家门口，她终于开口："你让我多没面子。"\n\n你说："妈，我不想让你没面子。但我也不想让自己没有自己。"\n\n她摔了门。你在自己房间里，既后悔又不后悔。'},
      {text:'笑笑不说话，在心里记住了这一刻',
        effects:{m:-10},flags:['family_silence'],
        result:'你笑了笑，低头吃饭。筷子夹起的菜，嚼起来没有味道。\n\n你在心里想：以后我自己的孩子，我不会这样说。\n\n但"以后"太远了。"现在"的窒息感，才是真实的。'},
      {text:'私下跟妈妈谈：你能不能不在外面这样说我？',
        effects:{m:5,c:5},flags:['private_talk_mom'],
        result:'晚上，你敲了她房间的门。\n\n「妈，你能不能以后在亲戚面前……不那样说？」\n\n她看着你，半晌说：「我是在夸你啊。」\n\n你意识到，在她的认知里，"好嫁"确实是夸奖。你们之间的距离，不是一次谈话能跨越的。但你说了。这件事本身就是一步。'}
    ]
  },
  {id:'e05',pool:1,age:18,title:'初恋困境',
    cond:()=>true,priority:3,
    text:'有个男生跟你表白了。他人不坏，但你们在一起之后，他开始管你的事：不许跟其他男生说话，每天要报备行踪，你多看手机一会儿他就不高兴。\n\n他说这是因为太爱你了。\n\n你信了一段时间。直到有一天，你因为回复朋友消息慢了五分钟，他发了37条微信。',
    choices:[
      {text:'提分手',
        effects:{m:15,c:-5,h:5},flags:['broke_up_first'],

  {id:'e06',pool:2,age:19,title:'导师偏见',
    cond:()=>true,priority:10,
    text:'大一下学期。你所在的专业女生占七成，但导师在介绍科研机会时，目光几乎只落在那几个男生身上。\n\n学期末，一个成绩比你低15分的男同学进了导师的实验室。你鼓起勇气去问导师，他说：\n\n「实验室工作很辛苦，你们女生……不太方便。」',
    choices:[
      {text:'坚持争取：我可以做，请给我机会',
        effects:{c:-10,m:20},flags:['fought_for_lab'],
        result:'你站在他办公室门口，说了三遍"我可以"。\n\n他最终给了你一个"试用期"——而那个男同学没有试用期。\n\n不公平。但你进去了。你在心里记住了这个代价：女生要说三遍，男生一遍就够。'},
      {text:'加倍努力学习，用成绩证明自己',
        effects:{a:10,h:-15,m:-10},flags:['overwork_prove'],
        result:'你开始每天六点起床泡图书馆，凌晨一点回宿舍。GPA从3.5冲到3.9。\n\n但那个男同学已经在实验室发了论文，而你的简历上只有分数。\n\n你用透支换来的成绩，在这个系统里，抵不过一次"被选中"。你不知道该怪自己不够努力，还是该怪这个"不太方便"。'},
      {text:'和同专业的女生们讨论，记录下来',
        effects:{c:10,m:5},flags:['documented_bias'],
        result:'你在宿舍楼下拉了一个小群，叫"我们的不方便"。\n\n三天之内，群里多了47个人。她们每个人都有一个"不方便"的故事。有人被导师叫"小姑娘"，有人被拒绝参加学术会议因为"出差不安全"。\n\n你不知道这些故事最终会去哪里。但至少，它们不再是一个人的秘密了。'}

  },
  {id:'e07',pool:2,age:19,title:'室友矛盾',
    cond:()=>true,priority:5,
    text:'室友小薇开始在社交媒体上发一些含沙射影的内容。你们共同的朋友跟你说，她在背后说你"心机重""表面一套背后一套"。\n\n你完全不知道自己做了什么。你甚至昨天还帮她带了早饭。\n\n你翻看她的朋友圈，每一条都像在说你，又好像不是。',
    choices:[
      {text:'直接找她谈',
        effects:{m:10,c:5},flags:['confronted_roommate'],
        result:'「小薇，我看到你发的那些，你有什么想跟我说的吗？」\n\n她先是否认，然后沉默，最后哭了。原来她的奖学金没评上，而你评上了。她不是恨你，她是恨自己。\n\n你们那天聊到了凌晨三点。问题没有完全解决，但至少，你们看到了彼此。'},
      {text:'冷处理，减少接触',
        effects:{m:-5,c:-10},flags:['cold_roommate'],
        result:'你开始戴耳机，早出晚归，在图书馆待到闭馆。宿舍变成了一个只用来睡觉的地方。\n\n室友们开始选边站。你不知道自己是"赢了"还是"输了"——你只是不想再消耗了。\n\n但每天回到那个六人间，呼吸都是压抑的。'},
      {text:'跟其他室友聊聊，了解发生了什么',
        effects:{c:10,m:5},flags:['allies_roommate'],
        result:'另一个室友告诉你真相：小薇的家里最近出了事，经济压力很大，而你的奖学金名额……本来她也在争取。\n\n你没有完全原谅她的做法。但你理解了背后的原因。你发了一条消息给她：「如果有什么我能帮的，跟我说。」\n\n她没有回复。但第二天，她帮你带了早饭。'}

  {id:'e08',pool:2,age:20,title:'社团里的"开玩笑"',
    cond:()=>true,priority:6,
    text:'社团聚餐。喝了几杯之后，一个学长开始讲黄色笑话，而且越讲越过分。其中一个明显是在说你。\n\n桌上的男生们都在笑。有几个女生也在笑——那种不太自然的、陪着的笑。\n\n学长看着你说：「诶，你怎么不笑？开不起玩笑啊？」',
    choices:[
      {text:'「这个玩笑不好笑。」',
        effects:{m:20,c:-10},flags:['rejected_joke'],
        result:'你的声音不大，但在笑声里像一把刀。\n\n学长的笑凝固了。"至于吗？"\n\n至于。你站起来，拿了外套，走了。在门口，你听到后面有人也站起来了——是另一个女生。\n\n你们没有说话，但你们一起走了。有些话，行动比语言更清楚。'},
      {text:'尴尬地笑了笑，找借口离开',
        effects:{m:-10,h:-5},flags:['forced_laugh'],
        result:'你笑了。那种自己都觉得恶心的笑。\n\n然后你说胃不舒服，先走了。在出租车后座，你打开手机，想发一条朋友圈，写了又删、删了又写。\n\n最终什么都没发。但那天晚上洗澡的时候，你把水温调到了很烫，好像要把什么东西冲掉。'},
      {text:'事后在社团群里发了一条消息，说明感受',
        effects:{m:10,c:5},flags:['spoke_after'],
        result:'第二天，你在群里打了一段话：\n\n「昨天的笑话让我很不舒服。这不是开不起玩笑的问题，是尊重的问题。」\n\n有人刷了一排省略号。有人私聊你说"你说得对"。学长退群了。\n\n你不确定这是胜利还是什么。但至少，这个群里从此没有人再讲那种笑话了。'}

  },
  {id:'e09',pool:2,age:20,title:'经济独立的第一步',

    choices:[

        effects:{w:15,h:-10,m:10},flags:['financially_independent'],
        result:'你把生活费存了起来。每个月看着账户里的数字涨，有一种踏实感是任何别的东西给不了的。\n\n代价是黑眼圈和日渐减少的睡眠。你的室友问你为什么总在赶东西。你说"我在给自己挣一间自己的房间。"\n\n她没听懂。但你懂。'},

        effects:{w:5,a:5,m:5},flags:['balanced_work'],
        result:'你把兼职从每天减到每周三篇。收入少了，但成绩稳住了。\n\n你开始学会一件事：所有东西都有代价，选择不是"要不要"，而是"要多少"。\n\n月底看着比同学们少一些的账户余额，你想：不多，但够用。够用就是自由的起点。'},
      {text:'跟妈妈解释清楚：这不是丢人，这是学习',
        effects:{c:10,m:10},flags:['explained_to_mom'],
        result:'你打了一个很长的电话。你跟她说了文案怎么写、客户怎么对接、deadline是什么。她听了半天，最后说：\n\n「那……你注意身体。」\n\n她没说"我为你骄傲"，但"注意身体"是她能给出的最接近的版本了。你挂了电话，心里暖了一下。'}

  {id:'e10',pool:2,age:19,title:'网络暴力',
    cond:()=>true,priority:3,
    text:'你在社交媒体上分享了一篇关于性别平等的文章，加了自己的评论。\n\n一觉醒来，评论区炸了。\n\n"女拳警告""又一个被洗脑的""找不到男朋友才会发这种东西""心理有病"。\n\n其中有几个头像，你认出来是同校的人。',

      {text:'截图保存，私信那几个认识的人：你们在做什么？',

  // ===== POOL 3: 20-21岁 大三 (events 10-14) =====
  {id:'e11',pool:3,age:20,title:'实习·会议室',

    text:'你得到了一个好公司的实习机会。第一周，你在会议上提出了一个方案。\n\n没人回应。\n\n五分钟后，坐在你对面的男实习生用几乎一样的话重新说了一遍。领导点头："小陈的想法不错。"\n\n你看着他，他没有看你。',

      {text:'把方案整理成文档，发给全组，署上自己的名字',

    text:'你已经连续三周每天只睡四个小时。\n\n某天早上刷牙的时候，你站起来，眼前突然一黑。你扶着洗手台，等了十秒钟，世界才慢慢回来。\n\n室友在外面喊你快点，你说"马上"。但你的手在抖。',

      {text:'买了维生素，继续撑',

  {id:'e15',pool:3,age:21,title:'双面人生',
    cond:()=>hasFlag('double_life'),priority:9,
    text:'你当初表面答应了班主任的安排，暗地里走了自己的路。现在你拿到了一个跨学科项目的入场券——但你需要告诉家里真相。\n\n你妈以为你在念师范。你爸以为你以后会回老家当老师。而你手里拿着的是一个完全不同的未来。',
    choices:[

    text:'一个有权力的人——可能是导师、实习领导、或者某个"前辈"——在一次私下场合说了让你极度不适的话。\n\n他说："你条件不错，配合一下，对你以后有好处。"\n\n他的手放在你的肩膀上。你能闻到他身上烟味混合咖啡的气息。空气变得很粘稠。',

        result:'你把他的手拿开了。"请你尊重我。"\n\n他的表情从惊讶变成恼怒，最后变成那种"你会后悔的"微笑。\n\n你走出那间办公室之后，在楼梯间截图了他之前发的所有暧昧信息。你的手在抖。但你的手机里，多了一样武器。\n\n接下来的日子不好过。但至少，你没有在那间办公室里丢掉自己。'},
      {text:'找一个信任的人倾诉',
        effects:{c:10,m:5},flags:['told_someone_harassment'],
        result:'你打电话给你最信任的朋友，说了十分钟就说不下去了。\n\n她沉默了很久，然后说："这不是你的错。"\n\n五个字。你没想到自己这么需要听到这五个字。\n\n她帮你梳理了选择：举报、转组、收集证据、先保护自己。你不用一个人做决定了。\n\n有些重量，分给另一个人扛，就不会压断你。'},

  {id:'e17',pool:4,age:22,title:'考研还是就业',
    cond:()=>true,priority:7,
    text:'大四秋天。室友们分成了两派：考研的每天泡图书馆，找工作的每天赶面试。\n\n你夹在中间。你想考研——但你妈说"女孩子读那么多书嫁不出去"。你想工作——但你知道本科学历在你的专业里越来越不够用。\n\n截止日期在逼近。你还没决定。',
    choices:[
      {text:'考研。这是我想要的。',
        effects:{a:15,w:-10,m:10},flags:['chose_grad_school'],
        result:'你在报名表上点了"确认"。\n\n你妈打电话来的时候，你说："妈，我读书不是为了嫁不嫁得出去。"\n\n她叹了口气。在她的世界里，你在做一件危险的事。在你的世界里，你在做唯一正确的事。\n\n接下来的三个月，你的生活只剩下书本和泡面。但每一页翻过去，你都觉得自己离想要的生活更近了一步。'},
      {text:'先工作，赚钱，想清楚再说',
        effects:{w:10,m:5},flags:['chose_work_first'],
        result:'你开始投简历。秋招像一场战争——你投了47份简历，收到8个面试，拿到2个offer。\n\n你选了其中一个。不是最好的，但够用。你跟自己说：先站稳脚跟，以后还可以再考。\n\n你不确定"以后"是多久。但你至少知道，你不想让经济依赖成为你做所有选择的前提。'},
      {text:'GAP半年，想清楚自己到底要什么',
        effects:{m:15,w:-15,c:-5},flags:['took_gap'],
        result:'你做了一个所有人都不理解的决定：什么都不做。\n\n半年里，你打了零工、看了四十本书、去了两座城市、在咖啡馆里写了厚厚一本日记。\n\n你妈说你疯了。你室友觉得你在逃避。但在某个普通的下午，你坐在陌生城市的公园长椅上，忽然知道了自己想做什么。\n\n有时候，停下来不是浪费时间。停下来是在等自己的灵魂跟上脚步。'}
    ]
  },
  {id:'e18',pool:4,age:22,title:'友情考验',

    text:'你最好的朋友要结婚了。22岁，大四刚毕业。对象是她高中就在一起的男朋友。\n\n她兴奋地给你打电话。你……不知道该说什么。你不是不祝福她，但你隐约觉得太早了。而且她曾经说过想出国读书。\n\n"你不替我高兴吗？"她在电话那头问。',
    choices:[

      {text:'全力支持，帮她准备婚礼',
        effects:{c:15,m:-5},flags:['supported_friend_marriage'],
        result:'你帮她选婚纱、订酒店、做请帖。你把那个"太早了"的念头吞了下去。\n\n婚礼那天很美。她笑得很幸福。你在台下鼓掌，心里有一种奇怪的感觉——像是高兴和担心搅在一起。\n\n你问自己：你是在替她担心，还是因为她的选择让你质疑了自己的？'},
      {text:'诚实说：我觉得有点早，但这是你的人生',
        effects:{m:10,c:5},flags:['honest_friend'],
        result:'「我觉得22岁结婚有点早。但这是你的人生，你开心就好。我永远站在你这边。」\n\n她哭了。不是因为生气，是因为——"你是唯一一个跟我说实话的人。"\n\n原来所有人要么是反对，要么是敷衍地祝福。只有你说了真话，同时没有离开。\n\n你突然理解了：真正的友情不是永远同意对方，是敢说不，还留在原地。'}

    text:'你大一建的那个"我们的不方便"群，现在有了两百多人。有人提议：把这些故事整理成一份匿名报告，提交给学校。\n\n你犹豫了。因为你知道一旦提交，可能会引起很大的反响——也可能会引火烧身。',

  // ===== POOL 5: 22-23岁 求职/初入职场 (events 20-24) =====
  {id:'e20',pool:5,age:22,title:'面试的隐形门槛',
    cond:()=>true,priority:10,
    text:'面试。你穿了准备了三天的衣服，做了二十页的公司调研。前三十分钟聊得很好。然后面试官放下笔，笑着问：\n\n「你有男朋友吗？」\n「打算什么时候结婚？」\n「结了婚还会继续工作吗？」\n\n你知道这些问题违法。但你也知道你需要这份工作。',
    choices:[
      {text:'微笑回答：我的个人规划不会影响工作表现',
        effects:{m:10,w:10,c:-5},flags:['diplomatically_answered'],
        result:'你微笑着完美地避开了陷阱。面试官点了点头。\n\n你拿到了offer。但从签合同的第一天起，你就知道——这家公司把你当成一个有"保质期"的员工。\n\n结婚生育那道倒计时，不是你设的，但它一直在背景里转着。'},
      {text:'直说：这些问题与岗位无关，我拒绝回答',
        effects:{m:20,w:-15},flags:['refused_illegal_q'],
        result:'面试官的笑僵住了。"我们只是了解一下……"\n\n你站起来，说了声谢谢，走了。\n\n在电梯里，你盯着下行的数字，心跳很快。你可能失去了一个offer，但你保住了一种东西——你对自己的尊重。\n\n三天后，一个小公司的HR联系了你。她说："看到了你在某论坛上的帖子（你没发过），有人转述了你的经历。我们需要这样的人。"'},
      {text:'编一个让他们放心的答案',
        effects:{m:-10,w:5},flags:['performed_at_interview'],
        result:'"暂时没有男朋友，短期内没有结婚的打算，工作是我现阶段的重心。"\n\n每一个字都是假的。或者说，每一个字都是他们想听的。\n\n你拿到了offer。但在签合同的时候，你忽然想到：你到底还要假装多少次，才能换来一个"正常"的机会？'}
    ]
  },
  {id:'e21',pool:5,age:23,title:'催婚',
    cond:()=>true,priority:6,
    text:'过年回家。\n\n饭桌上，你二姨拉着你的手说："二十三了，该找了。"\n你妈接话："我同事的女儿比你小一岁，孩子都有了。"\n你爸沉默了一会儿，说了一句更重的："你让家里怎么跟外面的人交代？"\n\n外面的人。不知道名字的人。他们的"交代"比你的人生更重要。',
    choices:[
      {text:'「我的人生不需要跟外面的人交代。」',
        effects:{m:20,c:-15},flags:['refused_marriage_pressure'],
        result:'饭桌炸了。你妈放下了筷子。你二姨的笑容消失了。你爸的脸色沉下来。\n\n那顿饭没吃完。你在自己房间里坐了一个小时，听到客厅里他们在小声讨论你"越来越叛逆"。\n\n你打开手机，在备忘录里写了一行字："23岁。我选择让他们失望，好过让自己失望。"'},
      {text:'敷衍应付过去',
        effects:{m:-10},flags:['endured_pressure'],
        result:'你笑了笑。"嗯，在看了。"\n\n你二姨立刻说她有个朋友的儿子，条件不错。你妈眼睛亮了。\n\n你低头吃饭，嘴里嚼着什么味道都没有。你发现"敷衍"是有成本的——每一次敷衍，他们就以为你同意了，下次逼得更紧。'},
      {text:'认真谈：我现在的目标是事业，请你们相信我',
        effects:{m:10,c:5},flags:['career_talk_family'],
        result:'你放下筷子，认认真真地说了十分钟。你说了你的工作、你的计划、你对未来的想法。\n\n他们听了。\n\n你妈说："那你事业也稳定了，男朋友也该找了。"\n\n你发现了逻辑的漏洞：不管你说什么，他们的结论都是一样的。但至少你说了。至少你知道，自己不是"没想法"，只是想法跟他们不一样。'}

  {id:'e22',pool:5,age:23,title:'租房',

    choices:[

        result:'你说"我再看看"，走了。\n\n继续找了两周。住在青旅里，每天背着行李看房。最终找到了一间小得可怜但干净的房间，房东是一对老夫妻，阿姨帮你晒了被子。\n\n搬进去那天，你在十二平米的空间里转了一圈，觉得整个世界都是你的。'},

        result:'你签了合同。\n\n每天回家的路上，你会不自觉地加快脚步。进门之后先锁门、反锁、再拿衣架顶住门把手。你在自己的"家"里，像一只随时准备逃跑的动物。\n\n你知道这不是长久之计。但钱就这么多。安全感，原来也是需要用钱买的东西。'},
      {text:'找朋友合租',

        result:'你打了个电话给大学同学："来合租吗？"\n\n她正好也在找房。你们找了一个两居室，有阳台，有阳光，有锁好的门。\n\n搬进去那天，你们坐在地板上吃外卖，她说："我们终于有自己的地方了。"\n\n你说："嗯。我们的。"'}

  {id:'e23',pool:5,age:23,title:'公共场所',
    cond:()=>true,priority:5,
    text:'晚上十点。你在地铁上，旁边的男人点了一根烟。\n\n你说了一句："这里不能吸烟。"\n\n他慢慢转过头，站起来，用身体压近你。他骂了一句很难听的话。整节车厢的人，没有一个开口。\n\n车厢晃动着。他的烟灰落在你的鞋上。',

        result:'你站起来，走了。在两节车厢之间的连接处，你的眼泪掉了下来。\n\n不是因为害怕。是因为愤怒，无处安放的愤怒。你做了"正确的事"——提醒他不要吸烟，换来的是威胁。\n\n回家之后你锁上门，在备忘录里写了一句话："我很愤怒。但我没有错。"'},
      {text:'大声问车厢里的人：「有人看见了吗？」',
        effects:{c:10,m:10},flags:['called_witnesses'],
        result:'你的声音在车厢里震荡。所有人都低着头。\n\n然后，角落里，一个戴眼镜的女生站了起来。"我看见了。"\n\n又一个女生站起来。"我也是。"\n\n那个男人看看周围，掐灭了烟，骂了一句，到站就走了。\n\n那天晚上，戴眼镜的女生加了你的微信。她说：「谢谢你先开口。」\n\n有些勇气是会传染的。'}

  {id:'e24',pool:5,age:23,title:'薪资谈判',
    cond:()=>true,priority:3,
    text:'你发现做同样工作的男同事，工资比你高20%。你找HR问了——HR说："他有相关经验。"\n\n你也有。你的KPI比他高。但你入职的时候，HR问你"期望薪资"，你报了一个保守的数字。而他，报了一个你不敢报的数字。',
    choices:[
      {text:'要求调薪，拿出数据说话',
        effects:{w:15,m:15,c:-5},flags:['negotiated_salary'],
        result:'你做了一份Excel——你的KPI、你的项目成果、市场同岗位薪资。你把它打印出来放在HR桌上。\n\n"根据这些数据，我认为我的薪资应该调整。"\n\nHR看了你五秒钟。"我向上面反映。"\n\n两周后，你的薪资涨了15%。没有达到他的水平，但差距缩小了。你学到了一课：女生不是不能谈钱，是从来没人教我们谈钱。'},
      {text:'记住这件事，但现在不是合适的时机',
        effects:{m:-5,w:-5},flags:['delayed_salary'],
        result:'你在心里记了一笔账。\n\n你没有马上去谈，因为你才入职三个月。但你开始在每一次项目结束后保存数据、记录成果。你在给自己攒筹码。\n\n你告诉自己：等半年，等一年，等你手上有足够的牌。\n\n你不知道你在等的那一天会不会来。但你的Excel里的数字，每天都在变长。'},

// ==================== GAME FLOW ====================

function getEventsForYear(poolNum) {
  const poolEvents = EVENTS.filter(e => e.pool === poolNum && e.cond());
  poolEvents.sort((a,b) => b.priority - a.priority);
  return poolEvents;
}

function pickEventForYear(poolNum) {
  const available = getEventsForYear(poolNum);
  if (available.length === 0) return null;
  // pick highest priority, with some randomness
  const top = available.slice(0, Math.min(3, available.length));
  return top[Math.floor(Math.random() * top.length)];
}

function startGame() {
  G.year = 0;
  G.history = [];
  showDialogue(0);
}

function getDialogueForYear(yearIdx) {
  const keys = Object.keys(DIALOGUES);
  const key = keys[yearIdx % keys.length];
  const d = DIALOGUES[key];
  // find best matching quote
  let bestQuote = d.quotes[0];
  for (let i = d.quotes.length - 1; i >= 0; i--) {
    if (d.quotes[i].cond()) {
      bestQuote = d.quotes[i];
      break;
    }
  }
  return { name: d.name, color: d.color, text: bestQuote.text };
}

function showDialogue(yearIdx) {
  const d = getDialogueForYear(yearIdx);
  const ageLabels = ['18岁 · 高三', '19岁 · 大一', '20岁 · 大二大三', '21岁 · 大三大四', '22-23岁 · 求职', '23-24岁 · 独立'];
  const label = yearIdx < ageLabels.length ? ageLabels[yearIdx] : '';

  render(`
    <div class="dialogue-screen">
      ${progressHTML(yearIdx)}
      <div class="context">${label} · 序幕</div>
      <div class="speaker" style="color:${d.color}">${d.name}</div>
      <div class="quote">"${d.text.replace(/\n/g,'<br>')}"</div>
      <button class="btn" onclick="showYearEvent(${yearIdx})">继续</button>
    </div>
  `);
}

function showYearEvent(yearIdx) {
  const poolNum = yearIdx + 1;
  const event = pickEventForYear(poolNum);
  if (!event) {
    // fallback
    advanceYear(yearIdx);
    return;
  }

  const ageLabels = ['18','19','20','21','22-23','23-24'];
  const age = ageLabels[yearIdx] || '24';
  const yearDescs = ['高三 · 这一年你站在起点','大一 · 新的世界和旧的规则','大二大三 · 你开始看清一些东西','大三大四 · 选择越来越重','求职 · 社会给你上了第一课','独立 · 你开始成为你自己'];

  // Handle dynamic text
  let eventText = event.text;
  if (typeof eventText === 'function') eventText = eventText();

  let choicesHTML = '';
  event.choices.forEach((ch, i) => {
    choicesHTML += `<button class="choice-btn" onclick="makeChoice(${yearIdx},'${event.id}',${i})">
      <span class="choice-label">选项 ${['一','二','三'][i]}</span>
      ${ch.text}
    </button>`;
  });

  // butterfly effect notes
  let butterflyHTML = '';
  const bNotes = [];
  if (hasFlag('double_life') && event.id === 'e15') bNotes.push('🦋 你在18岁埋下的秘密，现在到了揭晓的时刻');
  if (hasFlag('stayed_controlling') && event.id === 'e14') bNotes.push('🦋 你18岁的那段感情，从未真正结束');
  if (hasFlag('documented_bias') && event.id === 'e19') bNotes.push('🦋 你大一建的那个群，长成了意想不到的样子');
  if (hasFlag('stayed_science') && event.id === 'e12') bNotes.push('🦋 你当初坚持留在理科的选择，把你带到了这里');
  if (bNotes.length > 0) {
    butterflyHTML = bNotes.map(n => `<div class="butterfly">${n}</div>`).join('');
  }

  render(`
    <div class="year-header">
      ${progressHTML(yearIdx)}
      <div class="age">${age}</div>
      <div class="year-desc">${yearDescs[yearIdx] || ''}</div>
    </div>
    ${statsHTML()}
    <div class="section-title">${event.title}</div>
    ${butterflyHTML}
    <div class="narrative">${eventText.replace(/\n/g,'<br>')}</div>
    <div class="divider"></div>
    ${choicesHTML}
  `);
}

function makeChoice(yearIdx, eventId, choiceIdx) {
  const event = EVENTS.find(e => e.id === eventId);
  const choice = event.choices[choiceIdx];

  // apply effects
  const changes = applyStats(choice.effects || {});

  // set flags
  if (choice.flags) choice.flags.forEach(f => setFlag(f));

  // record history
  G.history.push({ eventId, choiceIdx, yearIdx });

  // check for butterfly connections
  let flagNotes = [];
  if (choice.flags) {

function advanceYear(yearIdx) {

function calculateEnding() {
  const s = G.stats;
  const total = s.h + s.w + s.c + s.a + s.m;

  // Ending categories based on flags and stats
  let endingType = 'survivor'; // default

  const rebellionFlags = ['defied_family','refused_marriage_pressure','spoke_in_meeting','demanded_transparency','refused_harassment','rejected_joke','spoke_against_rating','fought_for_lab','refused_illegal_q'];
  const rebellionCount = rebellionFlags.filter(f => hasFlag(f)).length;

  const solidarityFlags = ['documented_bias','collective_action','salary_solidarity','found_women_sci','submitted_report','went_public','spread_awareness','called_witnesses','shared_story'];
  const solidarityCount = solidarityFlags.filter(f => hasFlag(f)).length;

  const selfCareFlags = ['took_rest','rest_day','own_room_plant','own_room_silence','own_room_mom','balanced_work','left_controlling_rel','broke_up_first'];
  const selfCareCount = selfCareFlags.filter(f => hasFlag(f)).length;

  const suppressionFlags = ['suppressed_harassment','stayed_controlling','endured_pressure','forced_laugh','retreated_online','retreated_subway','family_silence','swallowed'];
  const suppressionCount = suppressionFlags.filter(f => hasFlag(f)).length;

  if (rebellionCount >= 3 && s.m >= 60) endingType = 'fire';
  else if (solidarityCount >= 3) endingType = 'wave';
  else if (selfCareCount >= 3 && s.h >= 50) endingType = 'garden';
  else if (suppressionCount >= 3 && s.m <= 35) endingType = 'glass';
  else if (s.m >= 70) endingType = 'awake';
  else if (total >= 280) endingType = 'balance';
  else if (s.m <= 25 && s.h <= 25) endingType = 'edge';

  return endingType;
}
